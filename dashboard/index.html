<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화면 감지 모니터링</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f4f6f9; color: #222; }
    header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 16px 24px; }
    header h1 { font-size: 18px; font-weight: 600; }
    header p { font-size: 13px; color: #888; margin-top: 2px; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat { background: #fff; border-radius: 12px; padding: 16px; border: 1px solid #e5e7eb; }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 600; color: #1a7a56; }
    .section-title { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 12px; }
    .signal-card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #e5e7eb; display: flex; align-items: center; gap: 14px; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; background: #e0f2ea; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: #1a7a56; flex-shrink: 0; }
    .signal-info { flex: 1; }
    .signal-name { font-size: 15px; font-weight: 600; }
    .signal-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .signal-time { font-size: 13px; color: #444; text-align: right; white-space: nowrap; }
    .badge { display: inline-block; background: #e0f2ea; color: #1a7a56; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-top: 4px; }
    .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <header>
    <h1>화면 감지 모니터링</h1>
    <p><span class="dot"></span>실시간 연결 중 · 3초마다 자동 갱신</p>
  </header>
  <div class="container">
    <div class="stats">
      <div class="stat">
        <div class="stat-label">총 수신 신호</div>
        <div class="stat-value" id="totalCount">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">등록된 사용자</div>
        <div class="stat-value" id="userCount">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">오늘 신호</div>
        <div class="stat-value" id="todayCount">-</div>
      </div>
    </div>
    <div class="section-title">최근 활동 내역</div>
    <div id="list"><div class="empty">신호를 기다리는 중...</div></div>
  </div>
  <script>
    // const SERVER = 'http://10.32.230.184:3000';  // Railway 배포 후엔 비워두면 같은 서버에서 가져옴
    const SERVER = 'https://senior-monitor01-production.up.railway.app';  // Railway


    function initials(name) {
      return name ? name[0] : '?';
    }

    function todaySignals(signals) {
      const today = new Date().toLocaleDateString('ko-KR');
      return signals.filter(s => s.screenOnTime && s.screenOnTime.startsWith(today)).length;
    }

    async function load() {
      try {
        const [sigRes, userRes] = await Promise.all([
          fetch(SERVER + '/signals'),
          fetch(SERVER + '/users')
        ]);
        const signals = await sigRes.json();
        const users = await userRes.json();

        document.getElementById('totalCount').textContent = signals.length;
        document.getElementById('userCount').textContent = Object.keys(users).length;
        document.getElementById('todayCount').textContent = todaySignals(signals);

        if (signals.length === 0) {
          document.getElementById('list').innerHTML = '<div class="empty">아직 수신된 신호가 없어요</div>';
          return;
        }

        document.getElementById('list').innerHTML = signals.map(s => `
          <div class="signal-card">
            <div class="avatar">${initials(s.name)}</div>
            <div class="signal-info">
              <div class="signal-name">${s.name}</div>
              <div class="signal-meta">${s.birthdate ? '생년월일 ' + s.birthdate + ' · ' : ''}${s.deviceModel}</div>
              <div class="badge">화면 켜짐</div>
            </div>
            <div class="signal-time">${s.screenOnTime}</div>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('list').innerHTML = '<div class="empty" style="color:#e55">서버 연결 실패. 서버가 실행 중인지 확인하세요.</div>';
      }
    }

    load();
    setInterval(load, 3000);
  </script>
</body>
</html>
